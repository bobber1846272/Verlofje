<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Snipper — verlofuren</title>
<meta name="description" content="Weet altijd hoeveel vrij je nog hebt.">
<meta name="theme-color" content="#2E6E5A">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232E6E5A'/><text y='72' x='50' text-anchor='middle' font-size='58' fill='%23F0C05A' font-family='sans-serif'>S</text></svg>">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Avenir Next', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #F1F5F3;
    color: #22332E;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }
  .app { max-width: 560px; margin: 0 auto; padding: 20px 14px 40px; min-height: 100vh; }
  input, select, button { font-family: inherit; }
  input:focus, select:focus, button:focus-visible { outline: 2px solid #F0C05A; outline-offset: 2px; }
  .primair:hover { background: #25594A; }
  .tab-knop:hover { color: #22332E; }
  .icoon:hover { background: #EEF3F1; border-radius: 8px; }
  .entry-rij + .entry-rij { border-top: 1px solid #E4EBE8; }
  .jaren { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .jaren::-webkit-scrollbar { display: none; }
  .jaar-chip:hover { background: rgba(255,255,255,0.28); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const STORAGE_KEY = "snipper-verlofuren";
const DAG_NAMEN = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];

const LEEG_JAAR = { tegoed: 0, bovenwettelijk: 0, weekUren: [0, 0, 0, 0, 0, 0, 0], entries: [] };

const START_DATA = {
  actiefJaar: "2026",
  jaren: {
    "2026": {
      tegoed: 164,
      bovenwettelijk: 4.07,
      weekUren: [8.5, 4.5, 7.5, 7.5, 0, 0, 0],
      entries: [
        { id: "e1", omschrijving: "Middag / Sterfdag Pa", van: "2026-02-19", tot: "2026-02-19", uren: 3.5, type: "Verlof" },
        { id: "e2", omschrijving: "Verjaardag Ma / meivakantie", van: "2026-04-22", tot: "2026-04-22", uren: 7.5, type: "Verlof" },
        { id: "e3", omschrijving: "Meivakantie", van: "2026-04-23", tot: "2026-04-23", uren: 7.5, type: "Verlof" },
        { id: "e4", omschrijving: "Denemarken / Toernooi", van: "2026-05-21", tot: "2026-05-21", uren: 3, type: "Verlof" },
        { id: "e5", omschrijving: "Zomervakantie week 2", van: "2026-07-27", tot: "2026-07-31", uren: 28, type: "Verlof" },
        { id: "e6", omschrijving: "Zomervakantie week 3", van: "2026-08-03", tot: "2026-08-07", uren: 28, type: "Verlof" },
        { id: "e7", omschrijving: "Zomervakantie week 4", van: "2026-08-10", tot: "2026-08-14", uren: 28, type: "Verlof" },
        { id: "e8", omschrijving: "Herfstvakantie", van: "2026-10-19", tot: "2026-10-25", uren: 28, type: "Verlof" },
        { id: "e9", omschrijving: "Kerstvakantie", van: "2026-12-23", tot: "2026-12-24", uren: 15, type: "Verlof" },
        { id: "e10", omschrijving: "Kerstvakantie", van: "2026-12-31", tot: "2026-12-31", uren: 7.5, type: "Verlof" },
      ],
    },
  },
};

function parseNum(v) {
  const n = parseFloat(String(v).replace(",", "."));
  return isNaN(n) ? 0 : n;
}
function fmt(n) {
  const r = Math.round(n * 100) / 100;
  return r.toLocaleString("nl-NL", { maximumFractionDigits: 2 });
}
function dateFromStr(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function fmtDatum(s) {
  if (!s) return "";
  return new Intl.DateTimeFormat("nl-NL", { weekday: "short", day: "numeric", month: "short" }).format(dateFromStr(s));
}
function berekenUren(van, tot, weekUren) {
  if (!van) return 0;
  const start = dateFromStr(van);
  const eind = tot ? dateFromStr(tot) : start;
  if (eind < start) return 0;
  let totaal = 0, guard = 0;
  const d = new Date(start);
  while (d <= eind && guard < 400) {
    totaal += weekUren[(d.getDay() + 6) % 7] || 0;
    d.setDate(d.getDate() + 1);
    guard++;
  }
  return totaal;
}
function jaarTotalen(j) {
  if (!j) return { tegoed: 0, opgenomen: 0, bijzonder: 0, over: 0 };
  const tegoed = parseNum(j.tegoed) + parseNum(j.bovenwettelijk);
  const opgenomen = j.entries.filter((e) => e.type !== "Bijzonder verlof").reduce((s, e) => s + parseNum(e.uren), 0);
  const bijzonder = j.entries.filter((e) => e.type === "Bijzonder verlof").reduce((s, e) => s + parseNum(e.uren), 0);
  return { tegoed, opgenomen, bijzonder, over: tegoed - opgenomen };
}

function App() {
  const [data, setData] = useState(START_DATA);
  const [tab, setTab] = useState("overzicht");
  const [loaded, setLoaded] = useState(false);

  const leeg = { omschrijving: "", van: "", tot: "", uren: "", type: "Verlof" };
  const [form, setForm] = useState(leeg);
  const [urenAangepast, setUrenAangepast] = useState(false);
  const [editId, setEditId] = useState(null);
  const formRef = useRef(null);

  const [nieuwJaarOpen, setNieuwJaarOpen] = useState(false);
  const [nieuwJaar, setNieuwJaar] = useState("");

  // ---- laden (met migratie van de oude opzet met één jaar) ----
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const opgeslagen = JSON.parse(raw);
        if (opgeslagen.jaren) {
          setData(opgeslagen);
        } else if (opgeslagen.settings) {
          const jaar = String(opgeslagen.settings.jaar || 2026);
          setData({
            actiefJaar: jaar,
            jaren: {
              [jaar]: {
                tegoed: opgeslagen.settings.tegoed,
                bovenwettelijk: opgeslagen.settings.bovenwettelijk,
                weekUren: opgeslagen.settings.weekUren,
                entries: opgeslagen.entries || [],
              },
            },
          });
        }
      }
    } catch (e) {
      console.error("Laden mislukt", e);
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
      console.error("Opslaan mislukt", e);
    }
  }, [data, loaded]);

  const jaarKeys = Object.keys(data.jaren).sort((a, b) => Number(b) - Number(a));
  const actief = data.actiefJaar;
  const jaar = data.jaren[actief] || LEEG_JAAR;

  useEffect(() => {
    if (!urenAangepast && form.van) {
      const auto = berekenUren(form.van, form.tot || form.van, jaar.weekUren);
      setForm((f) => ({ ...f, uren: auto ? String(auto).replace(".", ",") : "" }));
    }
  }, [form.van, form.tot, jaar.weekUren, urenAangepast]);

  const { tegoed: totaalTegoed, opgenomen, bijzonder, over } = jaarTotalen(jaar);
  const pct = totaalTegoed > 0 ? Math.min(100, (opgenomen / totaalTegoed) * 100) : 0;
  const gesorteerd = [...jaar.entries].sort((a, b) => (a.van < b.van ? -1 : 1));

  // ---- helpers om het actieve jaar bij te werken ----
  function updateJaar(velden) {
    setData((d) => ({ ...d, jaren: { ...d.jaren, [d.actiefJaar]: { ...d.jaren[d.actiefJaar], ...velden } } }));
  }
  function kiesJaar(j) {
    setData((d) => ({ ...d, actiefJaar: j }));
    setForm(leeg); setEditId(null); setUrenAangepast(false); setNieuwJaarOpen(false);
  }

  function voegJaarToe() {
    const j = String(parseInt(nieuwJaar, 10));
    if (!/^\d{4}$/.test(j) || data.jaren[j]) return;
    const bestaande = Object.keys(data.jaren).map(Number);
    // uren per dag overnemen van het dichtstbijzijnde jaar
    const dichtstbij = bestaande.sort((a, b) => Math.abs(a - Number(j)) - Math.abs(b - Number(j)))[0];
    const bron = data.jaren[String(dichtstbij)] || LEEG_JAAR;
    // staat het vorige jaar erin? dan het restant meenemen als bovenwettelijk
    const vorige = data.jaren[String(Number(j) - 1)];
    const rest = vorige ? jaarTotalen(vorige).over : 0;
    setData((d) => ({
      ...d,
      actiefJaar: j,
      jaren: {
        ...d.jaren,
        [j]: {
          tegoed: bron.tegoed,
          bovenwettelijk: vorige ? Math.max(0, Math.round(rest * 100) / 100) : 0,
          weekUren: [...bron.weekUren],
          entries: [],
        },
      },
    }));
    setNieuwJaar(""); setNieuwJaarOpen(false); setTab("instellingen");
  }

  function verwijderJaar() {
    if (jaarKeys.length < 2) return;
    if (!window.confirm("Jaar " + actief + " verwijderen? Alle ingevoerde dagen van dat jaar verdwijnen.")) return;
    setData((d) => {
      const jaren = { ...d.jaren };
      delete jaren[d.actiefJaar];
      return { actiefJaar: Object.keys(jaren).sort((a, b) => Number(b) - Number(a))[0], jaren };
    });
  }

  function bewaarEntry() {
    if (!form.van || !parseNum(form.uren)) return;
    const entry = {
      id: editId || "e" + Date.now(),
      omschrijving: form.omschrijving.trim() || "Verlof",
      van: form.van,
      tot: form.tot && form.tot >= form.van ? form.tot : form.van,
      uren: parseNum(form.uren),
      type: form.type,
    };
    updateJaar({ entries: editId ? jaar.entries.map((e) => (e.id === editId ? entry : e)) : [...jaar.entries, entry] });
    setForm(leeg); setUrenAangepast(false); setEditId(null);
  }

  function startBewerken(e) {
    setForm({ omschrijving: e.omschrijving, van: e.van, tot: e.tot, uren: String(e.uren).replace(".", ","), type: e.type });
    setUrenAangepast(true); setEditId(e.id); setTab("overzicht");
    setTimeout(() => formRef.current && formRef.current.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
  }

  function verwijder(id) {
    updateJaar({ entries: jaar.entries.filter((e) => e.id !== id) });
    if (editId === id) { setForm(leeg); setEditId(null); setUrenAangepast(false); }
  }

  function setWeekUur(idx, val) {
    const nieuw = [...jaar.weekUren];
    nieuw[idx] = val;
    updateJaar({ weekUren: nieuw });
  }

  if (!loaded) {
    return <div className="app"><div style={{ ...s.card, textAlign: "center", color: "#6B7A74" }}>Even laden…</div></div>;
  }

  return (
    <div className="app">
      <header style={s.header}>
        <div style={s.kicker}>Snipper</div>

        <div className="jaren" style={{ margin: "10px 0 14px" }}>
          {jaarKeys.map((j) => (
            <button key={j} className="jaar-chip" onClick={() => kiesJaar(j)}
              style={{ ...s.jaarChip, ...(j === actief ? s.jaarChipActief : {}) }}>{j}</button>
          ))}
          <button className="jaar-chip" style={s.jaarChip}
            onClick={() => {
              const laagste = Math.min.apply(null, jaarKeys.map(Number));
              setNieuwJaar(String(laagste - 1));
              setNieuwJaarOpen(!nieuwJaarOpen);
            }}>+ jaar</button>
        </div>

        {nieuwJaarOpen && (
          <div style={s.nieuwJaarPaneel}>
            <input style={s.jaarInput} inputMode="numeric" value={nieuwJaar} maxLength={4}
              onChange={(ev) => setNieuwJaar(ev.target.value.replace(/\D/g, ""))} placeholder="jaartal" />
            <button className="primair" style={{ ...s.primair, background: "#F0C05A", color: "#3B2E10" }}
              onClick={voegJaarToe}>Jaar toevoegen</button>
            <button style={s.annuleerLicht} onClick={() => setNieuwJaarOpen(false)}>Annuleren</button>
          </div>
        )}

        <div style={s.bigRow}>
          <span style={s.bigNumber}>{fmt(over)}</span>
          <span style={s.bigUnit}>uur over</span>
        </div>
        <div style={s.balk}><div style={{ ...s.balkVulling, width: pct + "%" }} /></div>
        <div style={s.balkLabels}>
          <span>{fmt(opgenomen)} opgenomen</span>
          <span>{fmt(totaalTegoed)} totaal</span>
        </div>
      </header>

      <nav style={s.tabs}>
        {[["overzicht", "Overzicht"], ["instellingen", "Instellingen"], ["jaren", "Alle jaren"]].map(([key, label]) => (
          <button key={key} onClick={() => setTab(key)} className="tab-knop"
            style={{ ...s.tabKnop, ...(tab === key ? s.tabActief : {}) }}>{label}</button>
        ))}
      </nav>

      {tab === "overzicht" && (
        <React.Fragment>
          <section style={s.card} ref={formRef}>
            <h2 style={s.h2}>{editId ? "Verlof wijzigen" : "Verlof invoeren in " + actief}</h2>
            <label style={s.label}>Omschrijving
              <input style={s.input} value={form.omschrijving}
                onChange={(ev) => setForm({ ...form, omschrijving: ev.target.value })}
                placeholder="bijv. Herfstvakantie" />
            </label>
            <div style={s.rij2}>
              <label style={s.label}>Eerste dag
                <input type="date" style={s.input} value={form.van}
                  onChange={(ev) => { setUrenAangepast(false); setForm({ ...form, van: ev.target.value }); }} />
              </label>
              <label style={s.label}>Laatste dag <span style={s.klein}>(leeg = één dag)</span>
                <input type="date" style={s.input} value={form.tot} min={form.van || undefined}
                  onChange={(ev) => { setUrenAangepast(false); setForm({ ...form, tot: ev.target.value }); }} />
              </label>
            </div>
            <div style={s.rij2}>
              <label style={s.label}>Aantal uur <span style={s.klein}>(automatisch, aanpasbaar)</span>
                <input style={s.input} inputMode="decimal" value={form.uren} placeholder="0"
                  onChange={(ev) => { setUrenAangepast(true); setForm({ ...form, uren: ev.target.value }); }} />
              </label>
              <label style={s.label}>Soort
                <select style={s.input} value={form.type} onChange={(ev) => setForm({ ...form, type: ev.target.value })}>
                  <option>Verlof</option>
                  <option>Extra</option>
                  <option>Bijzonder verlof</option>
                </select>
              </label>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
              <button className="primair" style={s.primair} onClick={bewaarEntry}>
                {editId ? "Wijziging opslaan" : "Toevoegen"}
              </button>
              {editId && (
                <button style={s.secundair} onClick={() => { setForm(leeg); setEditId(null); setUrenAangepast(false); }}>
                  Annuleren
                </button>
              )}
            </div>
            <p style={s.hint}>
              Uren worden automatisch berekend op basis van de werkdagen (weekend en vrije dagen tellen niet mee).
              Bijzonder verlof gaat niet van het tegoed af.
            </p>
          </section>

          <section style={s.card}>
            <h2 style={s.h2}>Opgenomen verlof {actief}</h2>
            {gesorteerd.length === 0 && (
              <p style={{ color: "#6B7A74", margin: 0 }}>Nog geen verlof ingevoerd voor {actief}. Voeg hierboven de eerste dag toe.</p>
            )}
            {gesorteerd.map((e) => (
              <div key={e.id} style={s.entryRij} className="entry-rij">
                <div style={{ minWidth: 0 }}>
                  <div style={s.entryDatum}>
                    {e.van === e.tot ? fmtDatum(e.van) : fmtDatum(e.van) + " – " + fmtDatum(e.tot)}
                  </div>
                  <div style={s.entryOmschrijving}>
                    {e.omschrijving}
                    {e.type !== "Verlof" && <span style={s.badge}>{e.type}</span>}
                  </div>
                </div>
                <div style={s.entryRechts}>
                  <span style={s.entryUren}>{fmt(e.uren)} u</span>
                  <button className="icoon" style={s.icoonKnop} title="Wijzigen" onClick={() => startBewerken(e)}>✎</button>
                  <button className="icoon" style={{ ...s.icoonKnop, color: "#B4443C" }} title="Verwijderen"
                    onClick={() => verwijder(e.id)}>✕</button>
                </div>
              </div>
            ))}
            {bijzonder > 0 && (
              <p style={s.hint}>Waarvan {fmt(bijzonder)} uur bijzonder verlof (telt niet mee in het tegoed).</p>
            )}
          </section>
        </React.Fragment>
      )}

      {tab === "instellingen" && (
        <React.Fragment>
          <section style={s.card}>
            <h2 style={s.h2}>Tegoed {actief}</h2>
            <div style={s.rij2}>
              <label style={s.label}>Verlofrecht dit jaar (uur)
                <input style={s.input} inputMode="decimal" value={String(jaar.tegoed).replace(".", ",")}
                  onChange={(ev) => updateJaar({ tegoed: parseNum(ev.target.value) })} />
              </label>
              <label style={s.label}>Bovenwettelijk over van {Number(actief) - 1} (uur)
                <input style={s.input} inputMode="decimal" value={String(jaar.bovenwettelijk).replace(".", ",")}
                  onChange={(ev) => updateJaar({ bovenwettelijk: parseNum(ev.target.value) })} />
              </label>
            </div>
            <div style={s.totaalRij}><span>Totaal tegoed</span><strong>{fmt(totaalTegoed)} uur</strong></div>
          </section>

          <section style={s.card}>
            <h2 style={s.h2}>Werkdagen en uren per dag</h2>
            <p style={{ ...s.hint, marginTop: 0 }}>
              Geldt voor {actief}. Zet een dag op 0 als er niet gewerkt wordt — zo klopt de berekening ook als het
              rooster in een ander jaar anders was.
            </p>
            {DAG_NAMEN.map((naam, i) => (
              <div key={naam} style={s.dagRij}>
                <span style={{ color: jaar.weekUren[i] > 0 ? "#22332E" : "#9AA8A2" }}>{naam}</span>
                <input style={{ ...s.input, width: 90, textAlign: "right" }} inputMode="decimal"
                  value={String(jaar.weekUren[i]).replace(".", ",")}
                  onChange={(ev) => setWeekUur(i, parseNum(ev.target.value))} />
              </div>
            ))}
            <div style={s.totaalRij}>
              <span>Uren per week</span>
              <strong>{fmt(jaar.weekUren.reduce((t, u) => t + parseNum(u), 0))} uur</strong>
            </div>
          </section>

          {jaarKeys.length > 1 && (
            <section style={s.card}>
              <h2 style={s.h2}>Jaar verwijderen</h2>
              <p style={{ ...s.hint, marginTop: 0 }}>Verwijdert {actief} met alle ingevoerde dagen. Dit kan niet ongedaan gemaakt worden.</p>
              <button style={s.gevaar} onClick={verwijderJaar}>Verwijder {actief}</button>
            </section>
          )}
        </React.Fragment>
      )}

      {tab === "jaren" && (
        <section style={s.card}>
          <h2 style={s.h2}>Alle jaren</h2>
          {jaarKeys.map((j) => {
            const t = jaarTotalen(data.jaren[j]);
            return (
              <div key={j} style={s.entryRij} className="entry-rij">
                <div>
                  <div style={{ ...s.entryOmschrijving, fontSize: 17 }}>{j}</div>
                  <div style={s.entryDatum}>
                    {fmt(t.opgenomen)} van {fmt(t.tegoed)} uur opgenomen · {data.jaren[j].entries.length} invoer{data.jaren[j].entries.length === 1 ? "" : "en"}
                  </div>
                </div>
                <div style={s.entryRechts}>
                  <span style={{ ...s.entryUren, color: t.over < 0 ? "#B4443C" : "#22332E" }}>{fmt(t.over)} u over</span>
                  <button style={s.mini} onClick={() => { kiesJaar(j); setTab("overzicht"); }}>Open</button>
                </div>
              </div>
            );
          })}
          <p style={s.hint}>
            Een jaar toevoegen doe je met de knop <strong>+ jaar</strong> bovenaan. Voeg je een jaar toe dat direct op een
            bestaand jaar volgt, dan neemt Snipper het restant automatisch over als bovenwettelijk verlof.
          </p>
        </section>
      )}

      <footer style={s.footer}>Alles wordt automatisch bewaard op dit apparaat.</footer>
    </div>
  );
}

const s = {
  header: { background: "#2E6E5A", color: "#F3F8F6", borderRadius: 20, padding: "20px 22px 18px", marginBottom: 14 },
  kicker: { fontSize: 14, letterSpacing: "0.06em", textTransform: "uppercase", opacity: 0.85 },
  jaarChip: {
    flexShrink: 0, border: "none", borderRadius: 999, padding: "7px 14px", fontSize: 15, fontWeight: 600,
    background: "rgba(255,255,255,0.16)", color: "#F3F8F6", cursor: "pointer",
  },
  jaarChipActief: { background: "#F0C05A", color: "#3B2E10" },
  nieuwJaarPaneel: {
    display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center",
    background: "rgba(0,0,0,0.14)", borderRadius: 14, padding: 12, marginBottom: 14,
  },
  jaarInput: {
    width: 100, padding: "10px 12px", fontSize: 16, borderRadius: 10, border: "none",
    background: "#FBFDFC", color: "#22332E", textAlign: "center",
  },
  annuleerLicht: { background: "transparent", color: "#F3F8F6", border: "none", fontSize: 15, cursor: "pointer", padding: "10px 6px", opacity: 0.85 },
  bigRow: { display: "flex", alignItems: "baseline", gap: 10, margin: "0 0 14px" },
  bigNumber: { fontSize: 52, fontWeight: 700, lineHeight: 1, fontVariantNumeric: "tabular-nums" },
