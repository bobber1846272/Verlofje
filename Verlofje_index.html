<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Snipper — verlofuren</title>
<meta name="description" content="Weet altijd hoeveel vrij je nog hebt.">
<meta name="theme-color" content="#2E6E5A">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232E6E5A'/><text y='72' x='50' text-anchor='middle' font-size='58' fill='%23F0C05A' font-family='sans-serif'>S</text></svg>">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Avenir Next', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #F1F5F3;
    color: #22332E;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }
  .app { max-width: 560px; margin: 0 auto; padding: 20px 14px 40px; min-height: 100vh; }
  input, select, button { font-family: inherit; }
  input:focus, select:focus, button:focus-visible { outline: 2px solid #2E6E5A; outline-offset: 1px; }
  .primair:hover { background: #25594A; }
  .tab-knop:hover { color: #22332E; }
  .icoon:hover { background: #EEF3F1; border-radius: 8px; }
  .entry-rij + .entry-rij { border-top: 1px solid #E4EBE8; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ---------- opslag (localStorage) ----------
const STORAGE_KEY = "snipper-verlofuren";

const DAG_NAMEN = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];

const DEFAULT_SETTINGS = {
  jaar: 2026,
  tegoed: 164,
  bovenwettelijk: 4.07,
  weekUren: [8.5, 4.5, 7.5, 7.5, 0, 0, 0], // ma t/m zo
};

const DEFAULT_ENTRIES = [
  { id: "e1", omschrijving: "Middag / Sterfdag Pa", van: "2026-02-19", tot: "2026-02-19", uren: 3.5, type: "Verlof" },
  { id: "e2", omschrijving: "Verjaardag Ma / meivakantie", van: "2026-04-22", tot: "2026-04-22", uren: 7.5, type: "Verlof" },
  { id: "e3", omschrijving: "Meivakantie", van: "2026-04-23", tot: "2026-04-23", uren: 7.5, type: "Verlof" },
  { id: "e4", omschrijving: "Denemarken / Toernooi", van: "2026-05-21", tot: "2026-05-21", uren: 3, type: "Verlof" },
  { id: "e5", omschrijving: "Zomervakantie week 2", van: "2026-07-27", tot: "2026-07-31", uren: 28, type: "Verlof" },
  { id: "e6", omschrijving: "Zomervakantie week 3", van: "2026-08-03", tot: "2026-08-07", uren: 28, type: "Verlof" },
  { id: "e7", omschrijving: "Zomervakantie week 4", van: "2026-08-10", tot: "2026-08-14", uren: 28, type: "Verlof" },
  { id: "e8", omschrijving: "Herfstvakantie", van: "2026-10-19", tot: "2026-10-25", uren: 28, type: "Verlof" },
  { id: "e9", omschrijving: "Kerstvakantie", van: "2026-12-23", tot: "2026-12-24", uren: 15, type: "Verlof" },
  { id: "e10", omschrijving: "Kerstvakantie", van: "2026-12-31", tot: "2026-12-31", uren: 7.5, type: "Verlof" },
];

function parseNum(v) {
  const n = parseFloat(String(v).replace(",", "."));
  return isNaN(n) ? 0 : n;
}
function fmt(n) {
  const r = Math.round(n * 100) / 100;
  return r.toLocaleString("nl-NL", { maximumFractionDigits: 2 });
}
function dateFromStr(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function fmtDatum(s) {
  if (!s) return "";
  return new Intl.DateTimeFormat("nl-NL", { weekday: "short", day: "numeric", month: "short" }).format(dateFromStr(s));
}
function berekenUren(van, tot, weekUren) {
  if (!van) return 0;
  const start = dateFromStr(van);
  const eind = tot ? dateFromStr(tot) : start;
  if (eind < start) return 0;
  let totaal = 0, guard = 0;
  const d = new Date(start);
  while (d <= eind && guard < 400) {
    const dagIdx = (d.getDay() + 6) % 7;
    totaal += weekUren[dagIdx] || 0;
    d.setDate(d.getDate() + 1);
    guard++;
  }
  return totaal;
}

function App() {
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [entries, setEntries] = useState([]);
  const [tab, setTab] = useState("overzicht");
  const [loaded, setLoaded] = useState(false);

  const leeg = { omschrijving: "", van: "", tot: "", uren: "", type: "Verlof" };
  const [form, setForm] = useState(leeg);
  const [urenAangepast, setUrenAangepast] = useState(false);
  const [editId, setEditId] = useState(null);
  const formRef = useRef(null);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        setSettings({ ...DEFAULT_SETTINGS, ...data.settings });
        setEntries(data.entries || []);
      } else {
        setEntries(DEFAULT_ENTRIES);
      }
    } catch (e) {
      setEntries(DEFAULT_ENTRIES);
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ settings, entries }));
    } catch (e) {
      console.error("Opslaan mislukt", e);
    }
  }, [settings, entries, loaded]);

  useEffect(() => {
    if (!urenAangepast && form.van) {
      const auto = berekenUren(form.van, form.tot || form.van, settings.weekUren);
      setForm((f) => ({ ...f, uren: auto ? String(auto).replace(".", ",") : "" }));
    }
  }, [form.van, form.tot, settings.weekUren, urenAangepast]);

  const totaalTegoed = parseNum(settings.tegoed) + parseNum(settings.bovenwettelijk);
  const opgenomen = entries.filter((e) => e.type !== "Bijzonder verlof").reduce((s, e) => s + parseNum(e.uren), 0);
  const bijzonder = entries.filter((e) => e.type === "Bijzonder verlof").reduce((s, e) => s + parseNum(e.uren), 0);
  const over = totaalTegoed - opgenomen;
  const pct = totaalTegoed > 0 ? Math.min(100, (opgenomen / totaalTegoed) * 100) : 0;
  const gesorteerd = [...entries].sort((a, b) => (a.van < b.van ? -1 : 1));

  function bewaarEntry() {
    if (!form.van || !parseNum(form.uren)) return;
    const entry = {
      id: editId || "e" + Date.now(),
      omschrijving: form.omschrijving.trim() || "Verlof",
      van: form.van,
      tot: form.tot && form.tot >= form.van ? form.tot : form.van,
      uren: parseNum(form.uren),
      type: form.type,
    };
    setEntries((prev) => (editId ? prev.map((e) => (e.id === editId ? entry : e)) : [...prev, entry]));
    setForm(leeg);
    setUrenAangepast(false);
    setEditId(null);
  }

  function startBewerken(e) {
    setForm({ omschrijving: e.omschrijving, van: e.van, tot: e.tot, uren: String(e.uren).replace(".", ","), type: e.type });
    setUrenAangepast(true);
    setEditId(e.id);
    setTab("overzicht");
    setTimeout(() => formRef.current && formRef.current.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
  }

  function verwijder(id) {
    setEntries((prev) => prev.filter((e) => e.id !== id));
    if (editId === id) { setForm(leeg); setEditId(null); setUrenAangepast(false); }
  }

  function setWeekUur(idx, val) {
    const nieuw = [...settings.weekUren];
    nieuw[idx] = val;
    setSettings({ ...settings, weekUren: nieuw });
  }

  if (!loaded) {
    return <div className="app"><div style={{ ...s.card, textAlign: "center", color: "#6B7A74" }}>Even laden…</div></div>;
  }

  return (
    <div className="app">
      <header style={s.header}>
        <div style={s.kicker}>Snipper · {settings.jaar}</div>
        <div style={s.bigRow}>
          <span style={s.bigNumber}>{fmt(over)}</span>
          <span style={s.bigUnit}>uur over</span>
        </div>
        <div style={s.balk}><div style={{ ...s.balkVulling, width: pct + "%" }} /></div>
        <div style={s.balkLabels}>
          <span>{fmt(opgenomen)} opgenomen</span>
          <span>{fmt(totaalTegoed)} totaal</span>
        </div>
      </header>

      <nav style={s.tabs}>
        {[["overzicht", "Overzicht"], ["instellingen", "Instellingen"]].map(([key, label]) => (
          <button key={key} onClick={() => setTab(key)} className="tab-knop"
            style={{ ...s.tabKnop, ...(tab === key ? s.tabActief : {}) }}>{label}</button>
        ))}
      </nav>

      {tab === "overzicht" && (
        <React.Fragment>
          <section style={s.card} ref={formRef}>
            <h2 style={s.h2}>{editId ? "Verlof wijzigen" : "Verlof invoeren"}</h2>
            <label style={s.label}>Omschrijving
              <input style={s.input} value={form.omschrijving}
                onChange={(ev) => setForm({ ...form, omschrijving: ev.target.value })}
                placeholder="bijv. Herfstvakantie" />
            </label>
            <div style={s.rij2}>
              <label style={s.label}>Eerste dag
                <input type="date" style={s.input} value={form.van}
                  onChange={(ev) => { setUrenAangepast(false); setForm({ ...form, van: ev.target.value }); }} />
              </label>
              <label style={s.label}>Laatste dag <span style={s.klein}>(leeg = één dag)</span>
                <input type="date" style={s.input} value={form.tot} min={form.van || undefined}
                  onChange={(ev) => { setUrenAangepast(false); setForm({ ...form, tot: ev.target.value }); }} />
              </label>
            </div>
            <div style={s.rij2}>
              <label style={s.label}>Aantal uur <span style={s.klein}>(automatisch, aanpasbaar)</span>
                <input style={s.input} inputMode="decimal" value={form.uren} placeholder="0"
                  onChange={(ev) => { setUrenAangepast(true); setForm({ ...form, uren: ev.target.value }); }} />
              </label>
              <label style={s.label}>Soort
                <select style={s.input} value={form.type} onChange={(ev) => setForm({ ...form, type: ev.target.value })}>
                  <option>Verlof</option>
                  <option>Extra</option>
                  <option>Bijzonder verlof</option>
                </select>
              </label>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
              <button className="primair" style={s.primair} onClick={bewaarEntry}>
                {editId ? "Wijziging opslaan" : "Toevoegen"}
              </button>
              {editId && (
                <button style={s.secundair} onClick={() => { setForm(leeg); setEditId(null); setUrenAangepast(false); }}>
                  Annuleren
                </button>
              )}
            </div>
            <p style={s.hint}>
              Uren worden automatisch berekend op basis van de werkdagen (weekend en vrije dagen tellen niet mee).
              Bijzonder verlof gaat niet van het tegoed af.
            </p>
          </section>

          <section style={s.card}>
            <h2 style={s.h2}>Opgenomen verlof</h2>
            {gesorteerd.length === 0 && (
              <p style={{ color: "#6B7A74", margin: 0 }}>Nog geen verlof ingevoerd. Voeg hierboven de eerste dag toe.</p>
            )}
            {gesorteerd.map((e) => (
              <div key={e.id} style={s.entryRij} className="entry-rij">
                <div style={{ minWidth: 0 }}>
                  <div style={s.entryDatum}>
                    {e.van === e.tot ? fmtDatum(e.van) : fmtDatum(e.van) + " – " + fmtDatum(e.tot)}
                  </div>
                  <div style={s.entryOmschrijving}>
                    {e.omschrijving}
                    {e.type !== "Verlof" && <span style={s.badge}>{e.type}</span>}
                  </div>
                </div>
                <div style={s.entryRechts}>
                  <span style={s.entryUren}>{fmt(e.uren)} u</span>
                  <button className="icoon" style={s.icoonKnop} title="Wijzigen" onClick={() => startBewerken(e)}>✎</button>
                  <button className="icoon" style={{ ...s.icoonKnop, color: "#B4443C" }} title="Verwijderen"
                    onClick={() => verwijder(e.id)}>✕</button>
                </div>
              </div>
            ))}
            {bijzonder > 0 && (
              <p style={s.hint}>Waarvan {fmt(bijzonder)} uur bijzonder verlof (telt niet mee in het tegoed).</p>
            )}
          </section>
        </React.Fragment>
      )}

      {tab === "instellingen" && (
        <React.Fragment>
          <section style={s.card}>
            <h2 style={s.h2}>Tegoed {settings.jaar}</h2>
            <div style={s.rij2}>
              <label style={s.label}>Verlofrecht dit jaar (uur)
                <input style={s.input} inputMode="decimal" value={String(settings.tegoed).replace(".", ",")}
                  onChange={(ev) => setSettings({ ...settings, tegoed: parseNum(ev.target.value) })} />
              </label>
              <label style={s.label}>Bovenwettelijk over van vorig jaar (uur)
                <input style={s.input} inputMode="decimal" value={String(settings.bovenwettelijk).replace(".", ",")}
                  onChange={(ev) => setSettings({ ...settings, bovenwettelijk: parseNum(ev.target.value) })} />
              </label>
            </div>
            <div style={s.totaalRij}><span>Totaal tegoed</span><strong>{fmt(totaalTegoed)} uur</strong></div>
          </section>

          <section style={s.card}>
            <h2 style={s.h2}>Werkdagen en uren per dag</h2>
            <p style={{ ...s.hint, marginTop: 0 }}>
              Zet een dag op 0 als er niet gewerkt wordt. Deze uren worden gebruikt om verlof automatisch te berekenen.
            </p>
            {DAG_NAMEN.map((naam, i) => (
              <div key={naam} style={s.dagRij}>
                <span style={{ color: settings.weekUren[i] > 0 ? "#22332E" : "#9AA8A2" }}>{naam}</span>
                <input style={{ ...s.input, width: 90, textAlign: "right" }} inputMode="decimal"
                  value={String(settings.weekUren[i]).replace(".", ",")}
                  onChange={(ev) => setWeekUur(i, parseNum(ev.target.value))} />
              </div>
            ))}
            <div style={s.totaalRij}>
              <span>Uren per week</span>
              <strong>{fmt(settings.weekUren.reduce((t, u) => t + parseNum(u), 0))} uur</strong>
            </div>
          </section>
        </React.Fragment>
      )}

      <footer style={s.footer}>Alles wordt automatisch bewaard op dit apparaat.</footer>
    </div>
  );
}

const s = {
  header: { background: "#2E6E5A", color: "#F3F8F6", borderRadius: 20, padding: "22px 22px 18px", marginBottom: 14 },
  kicker: { fontSize: 14, letterSpacing: "0.06em", textTransform: "uppercase", opacity: 0.85 },
  bigRow: { display: "flex", alignItems: "baseline", gap: 10, margin: "6px 0 14px" },
  bigNumber: { fontSize: 52, fontWeight: 700, lineHeight: 1, fontVariantNumeric: "tabular-nums" },
  bigUnit: { fontSize: 18, opacity: 0.9 },
  balk: { height: 10, background: "rgba(255,255,255,0.25)", borderRadius: 6, overflow: "hidden" },
  balkVulling: { height: "100%", background: "#F0C05A", borderRadius: 6, transition: "width .4s ease" },
  balkLabels: { display: "flex", justifyContent: "space-between", fontSize: 13, marginTop: 8, opacity: 0.9 },
  tabs: { display: "flex", gap: 6, marginBottom: 14 },
  tabKnop: { flex: 1, padding: "10px 0", border: "none", borderRadius: 12, background: "transparent", color: "#5E6E68", fontSize: 16, fontWeight: 600, cursor: "pointer" },
  tabActief: { background: "#FFFFFF", color: "#22332E", boxShadow: "0 1px 3px rgba(34,51,46,0.12)" },
  card: { background: "#FFFFFF", borderRadius: 16, padding: "18px 18px 16px", marginBottom: 14, boxShadow: "0 1px 3px rgba(34,51,46,0.08)" },
  h2: { fontSize: 18, margin: "0 0 12px", fontWeight: 700 },
  label: { display: "block", fontSize: 14, fontWeight: 600, color: "#3C4C46", marginBottom: 12, flex: 1 },
  klein: { fontWeight: 400, color: "#8A9993" },
  input: { display: "block", width: "100%", marginTop: 5, padding: "10px 12px", fontSize: 16, border: "1px solid #CBD8D3", borderRadius: 10, background: "#FBFDFC", color: "#22332E" },
  rij2: { display: "flex", gap: 12, flexWrap: "wrap" },
  primair: { background: "#2E6E5A", color: "#fff", border: "none", borderRadius: 12, padding: "12px 22px", fontSize: 16, fontWeight: 700, cursor: "pointer" },
  secundair: { background: "#EEF3F1", color: "#3C4C46", border: "none", borderRadius: 12, padding: "12px 18px", fontSize: 16, fontWeight: 600, cursor: "pointer" },
  hint: { fontSize: 13.5, color: "#6B7A74", margin: "12px 0 0", lineHeight: 1.45 },
  entryRij: { display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, padding: "11px 0" },
  entryDatum: { fontSize: 13.5, color: "#6B7A74", fontVariantNumeric: "tabular-nums" },
  entryOmschrijving: { fontSize: 16, fontWeight: 600, overflowWrap: "anywhere" },
  badge: { marginLeft: 8, fontSize: 12, fontWeight: 600, background: "#F5EBDA", color: "#8A6A2E", borderRadius: 6, padding: "2px 7px", verticalAlign: "middle" },
  entryRechts: { display: "flex", alignItems: "center", gap: 4, flexShrink: 0 },
  entryUren: { fontWeight: 700, fontVariantNumeric: "tabular-nums", marginRight: 4 },
  icoonKnop: { border: "none", background: "transparent", fontSize: 17, cursor: "pointer", color: "#5E6E68", padding: "6px 8px", lineHeight: 1 },
  dagRij: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", fontSize: 16 },
  totaalRij: { display: "flex", justifyContent: "space-between", borderTop: "1px solid #E4EBE8", marginTop: 10, paddingTop: 12, fontSize: 16 },
  footer: { textAlign: "center", fontSize: 13, color: "#8A9993", marginTop: 6 },
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
